<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>課題③−1</title>
  </head>
  <body>
    <script>
      let num01 = 0; //変数はnum01、開始時0
      for (i = 1; i < 11; i++) {
        //iは繰り返しの回数のこと、1からスタートし、11未満なので10回繰り返す
        num01 = num01 + i; //num01再代入、num01に繰り返し回数を足していく
      }
      console.log(num01); //0+1=1,1+2=3,3+3=6,6+4=10,10+5=15,15+6=21,21+7=28,28+8=36,36+9=45,45+10=55

      if (num01 > 20) {
        console.log("20以上");
      }
    </script>
  </body>
</html>
